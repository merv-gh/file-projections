name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: gofmt
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - name: vet
        run: go vet ./...
      - name: test
        # Joern/Docker/Ollama/ast-grep-backed tests self-skip when the engine is absent,
        # so the suite is fully green on a stock CI runner.
        run: go test ./...
      - name: build
        run: go build -o bin/file-projections .

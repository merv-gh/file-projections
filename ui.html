<!doctype html><html><head><meta charset=utf-8>
<title>file-projections · lens studio</title>
<style>
:root{--bg:#ebe7dd;--panel:#f4f0e8;--soft:#e2ddd2;--line:#cec6b8;--fg:#25231f;--mut:#746b5d;--accent:#3f6f9f;--ok:#24784f;--bad:#b54848}
*{box-sizing:border-box}body{margin:0;font:13px/1.5 ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--fg)}
header{padding:.6rem 1rem;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
header b{font-size:1.05rem}
.chip{display:inline-flex;align-items:center;gap:.45rem;background:var(--soft);border:1px solid var(--line);border-radius:999px;padding:.2rem .25rem .2rem .7rem;font-size:.78rem}
.chip .lbl{color:var(--mut)}.chip .val{font-family:ui-monospace,Menlo,monospace;color:var(--fg)}
.chip button{padding:.18rem .55rem;font-size:.72rem;border-radius:999px}
.langtag{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--accent);border:1px solid var(--line);border-radius:999px;padding:.1rem .5rem;background:#fbf8f0}
.wrap{display:grid;grid-template-columns:320px 1fr;gap:0;height:calc(100vh - 50px)}
.col{overflow:auto;padding:1rem}.col.left{border-right:1px solid var(--line);background:var(--panel)}
h2{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);margin:1.2rem 0 .5rem}h2:first-child{margin-top:0}
label{display:block;color:var(--mut);font-size:.72rem;margin:.6rem 0 .15rem}
input,select,textarea{width:100%;background:#fbf8f0;color:var(--fg);border:1px solid var(--line);border-radius:6px;padding:.4rem .5rem;font:inherit}
textarea{font-family:ui-monospace,Menlo,monospace;font-size:12px;resize:vertical}
button{background:var(--accent);color:#f9fbff;border:0;border-radius:6px;padding:.45rem .8rem;font-weight:600;cursor:pointer}
button:disabled{opacity:.5;cursor:default}
button.ghost{background:#e7e1d6;color:var(--fg);border:1px solid var(--line)}
.field{position:relative;margin-bottom:.1rem}
.ac{display:none;position:absolute;z-index:5;left:0;right:0;top:calc(100% + 3px);max-height:16rem;overflow:auto;background:#fbf8f0;border:1px solid var(--line);border-radius:6px;box-shadow:0 10px 24px rgba(73,62,43,.18)}
.acitem{padding:.36rem .5rem;border-bottom:1px solid var(--soft);cursor:pointer}.acitem:last-child{border-bottom:0}.acitem:hover,.acitem.on{background:#ece5d8}.acitem b{color:var(--fg);font-weight:600}.acitem span{display:block;color:var(--mut);font-size:.72rem}
.hint{color:var(--mut);font-size:.72rem;margin:.2rem 0 0}
pre{background:#fbf8f0;border:1px solid var(--line);border-radius:8px;padding:.7rem;overflow:auto;white-space:pre;font-family:ui-monospace,Menlo,monospace;font-size:12px;max-height:72vh}
.note{color:var(--mut);font-size:.74rem;margin:.3rem 0}.err{color:var(--bad)}.ok{color:var(--ok)}
.tabs{display:flex;gap:.3rem;margin-bottom:.6rem}.tabs button{background:#e7e1d6;color:var(--fg);border:1px solid var(--line);font-weight:500}
.tabs button.on{background:var(--accent);color:#f9fbff}
.banner{margin:.6rem 0;padding:.5rem .7rem;border-radius:8px;font-size:.82rem;background:#fff3cd;color:#6a5118;border:1px solid #dfc46c}
.banner.ok{background:#dfeddf;color:#265f3f;border-color:#9cc8a6}
.unrollbody{display:grid;grid-template-columns:minmax(0,1fr) minmax(11rem,16rem);gap:.7rem;align-items:start}.unrollbody.no-side{grid-template-columns:1fr}.unrollbody.no-side .branchbar{display:none}
.branchbar{position:sticky;top:.2rem;z-index:2;display:block;background:#f5efe3;border:1px solid var(--line);border-radius:8px;padding:.55rem;max-height:calc(100vh - 12rem);overflow:auto}
.branchbar .title{display:block;color:var(--mut);font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;margin:.15rem 0 .45rem}.btab{border-top:1px solid var(--soft);padding:.45rem 0}.btab:first-of-type{border-top:0}.btab .where{display:block;color:var(--fg);font-size:.78rem;line-height:1.3;margin-bottom:.3rem}.btab .meta{display:block;color:var(--mut);font-size:.7rem;margin-bottom:.3rem}.bswitch{display:inline-flex;gap:.2rem;background:#e5ded1;border:1px solid var(--line);border-radius:999px;padding:.16rem}.bswitch button{padding:.16rem .45rem;border-radius:999px;background:transparent;color:var(--mut);border:0;font-size:.72rem}.bswitch button.on{background:var(--accent);color:#f9fbff}
.prog{margin:0;border:1px solid var(--line);border-radius:8px;overflow:auto;background:#fbf8f0;font-family:ui-monospace,Menlo,monospace;font-size:12.5px}
.pl{display:grid;grid-template-columns:7.5rem 1fr;min-height:1.75rem;border-bottom:1px solid var(--soft)}
.pl:last-child{border-bottom:0}.pl:hover{background:#f3ede2}
.pl .org{color:var(--mut);font-size:10.5px;padding:.28rem .5rem;border-right:1px solid var(--soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:default}
.pl .code{display:block;white-space:pre;outline:0;tab-size:4;min-height:1.25rem;padding:.22rem .65rem}
.pl .code:focus{background:#fffaf0;box-shadow:inset 2px 0 0 var(--accent)}
.pl.dirty{background:#fff6dc}.pl.flash{animation:flash 1.1s ease-out}
@keyframes flash{from{background:#d9eddc}to{background:transparent}}
/* early-return / guard / dead-tail */
.pl.exit{box-shadow:inset 3px 0 0 var(--bad)}.pl.exit .code{color:var(--bad)}
.pl.guard{box-shadow:inset 3px 0 0 #c79a3a}.pl.guard .code{color:#8a5a1a}
/* try/catch/finally */
.pl.catchhdr .code{color:var(--mut);font-style:italic;cursor:pointer}
.prog.fold .pl.struct:not(.catchhdr){display:none}
.prog.fold .pl.catchbody:not(.show){display:none}
.prog.fold .pl.catchhdr .code::after{content:" — folded, click to expand";font-size:11px;opacity:.7}
.progctl{display:flex;align-items:center;gap:.5rem;margin:.55rem 0 .35rem;flex-wrap:wrap}
.legend{display:flex;gap:.7rem;font-size:.7rem;color:var(--mut);margin-left:auto}
.legend i{font-style:normal;display:inline-flex;align-items:center;gap:.25rem}
.legend i::before{content:"";width:.7rem;height:.7rem;border-radius:2px;display:inline-block}
.legend i.lx::before{background:var(--bad)}.legend i.lg::before{background:#c79a3a}
.picker{position:absolute;z-index:9;background:#fbf8f0;border:1px solid var(--line);border-radius:8px;box-shadow:0 12px 28px rgba(73,62,43,.22);padding:.4rem;min-width:16rem;max-height:60vh;overflow:auto}
.picker .crumb{font-family:ui-monospace,Menlo,monospace;font-size:.72rem;color:var(--mut);padding:.2rem .3rem .4rem;border-bottom:1px solid var(--soft);margin-bottom:.3rem;display:flex;justify-content:space-between;gap:.5rem;align-items:center}
.picker .di{padding:.3rem .4rem;border-radius:5px;cursor:pointer;display:flex;align-items:center;gap:.4rem}.picker .di:hover{background:#ece5d8}
.pl .org{position:relative}
.pl.hasg .org::after{content:"?";position:absolute;right:.3rem;top:.28rem;font-size:9px;color:var(--accent);border:1px solid var(--line);border-radius:50%;width:.95rem;height:.95rem;line-height:.85rem;text-align:center;background:#fbf8f0}
.pl.hasg .org{cursor:help}
.assume{position:absolute;z-index:9;background:#1f2937;color:#f3f4f6;border-radius:8px;box-shadow:0 12px 28px rgba(0,0,0,.3);padding:.55rem .7rem;max-width:30rem;font-size:12px;line-height:1.5}
.assume .ah{font-size:.68rem;text-transform:uppercase;letter-spacing:.07em;color:#9ca3af;margin-bottom:.35rem}
.assume code{font-family:ui-monospace,Menlo,monospace;background:rgba(255,255,255,.1);padding:.05rem .3rem;border-radius:4px}
.assume .amp{color:#9ca3af;margin:0 .15rem}
</style></head><body>
<header>
 <b>file-projections</b>
 <span class=chip><span class=lbl>source</span><span class=val id=srval>.</span><button class=ghost id=srchange>Change…</button></span>
 <span class=langtag id=langtag>—</span>
 <span class=note id=cfgpath style=color:var(--mut)></span>
 <span style=margin-left:auto id=msg></span>
</header>
<div class=wrap id=wrap>
 <div class="col left">
  <h2>Lens</h2>
  <select id=an></select>
  <p class=hint id=anhint></p>
  <div id=params></div>
  <div id=unrollctl style=display:none>
   <label>entry — file › method</label>
   <div class=field><input id=uentry placeholder="App.java › summary" autocomplete=off><div id=entryac class=ac></div></div>
   <label>inputs <span style=color:var(--mut)>(optional — collapse to one path)</span></label>
   <input id=uinputs placeholder="coupon=save,amount=50">
   <label style="display:flex;justify-content:space-between">inline depth <b id=uinlinelabel>0</b></label>
   <input id=uinline type=range min=0 max=10 value=0 step=1>
   <p class=hint>Branches discover automatically as you change entry, inputs or depth.</p>
  </div>
 </div>
 <div class=col>
  <div class=tabs><button class=on id=tresult>Result</button><button id=tcfg>config.json</button></div>

  <div id=resultpane>
   <div id=lensview>
    <pre id=out>Pick a lens — it runs automatically.</pre>
    <div id=extra></div>
   </div>
   <div id=unrollview style=display:none>
    <div id=ubanner class=banner style=display:none></div>
    <div class=progctl>
     <button class=ghost id=foldtc>Hide try/catch</button>
     <span class=legend><i class=lx>early return / throw</i><i class=lg>guard</i></span>
    </div>
    <div id=unrollbody class="unrollbody no-side">
     <div id=uprog class=prog></div>
     <div id=branchbar class=branchbar></div>
    </div>
    <div class=row style=margin-top:.5rem><button id=usync disabled>Sync changes</button><span class=note id=ustatus style=margin-left:.6rem></span></div>
   </div>
  </div>

  <div id=cfgpane style=display:none>
   <textarea id=cfg rows=28></textarea>
   <div style=margin-top:.5rem><button id=savecfg>Save config.json</button><span class=note id=cfgmsg></span></div>
  </div>
 </div>
</div>
<script>
var msg=document.getElementById("msg");
function el(id){return document.getElementById(id)}
function flash(t,bad){msg.textContent=t;msg.className=bad?"err":"ok";setTimeout(function(){if(msg.textContent===t)msg.textContent=""},2500)}
function esc(s){return String(s||"").replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]})}
function debounce(fn,ms){var t;return function(){clearTimeout(t);var a=arguments,self=this;t=setTimeout(function(){fn.apply(self,a)},ms)}}

var STATE={lang:"",sourceRoot:".",analyzers:[],applic:{},defaults:{}};
var SCHEMA={
 "control-flow":[{k:"file",t:"file"},{k:"line",t:"line"}],
 "data-flow":[{k:"file",t:"file"},{k:"line",t:"line"},{k:"var",t:"var"}],
 "object-flow":[{k:"type",t:"type"},{k:"mode",t:"select",opts:["joern","cpg"]}],
 "cpg-methods":[{k:"file",t:"file"},{k:"method",t:"method"}],
 "joern-var-flow":[{k:"file",t:"file"},{k:"var",t:"var"},{k:"mode",t:"select",opts:["joern","cpg"]}],
 "entrypoints":[{k:"patterns",t:"text",ex:"http-mapping=@(Get|Post)Mapping"}],
 "exitpoints":[{k:"sinks",t:"text",ex:"*repository*.save,*kafka*.send"}],
 "flow":[{k:"entry",t:"text",ex:"@PostMapping"},{k:"sink",t:"text",ex:"\\.save\\("}],
 "java-post-to-save":[{k:"entry",t:"text",ex:"@PostMapping"},{k:"sink",t:"text",ex:"\\.save\\("}],
 "bookmark":[{k:"file",t:"file"},{k:"lines",t:"text",ex:"7-12"}],
 "go-symbols":[],"jsonl":[],"js-events":[],"extract":[{k:"file",t:"file"},{k:"lines",t:"text",ex:"7-12"}],
 "ast-grep":[{k:"pattern",t:"text",ex:"$A.save($B)"}]
};
var HINTS={
 "control-flow":"Control-flow graph of a method at file:line.","data-flow":"How a variable flows through a method.",
 "object-flow":"How instances of a type move through the program.","cpg-methods":"Methods reachable in the CPG from file:method.",
 "joern-var-flow":"Joern-backed variable flow.","entrypoints":"Detected app entrypoints (routes, listeners).",
 "exitpoints":"Sinks/exits (saves, sends).","flow":"Paths from an entry pattern to a sink pattern.",
 "java-post-to-save":"Paths from an entry pattern to a sink pattern.","bookmark":"Pin a line range of a file.",
 "extract":"Pin a line range of a file.","go-symbols":"All Go symbols under the source root — no params.",
 "jsonl":"Project the .jsonl data files.","js-events":"JS event surface.","ast-grep":"Structural search by pattern.",
 "unrolled-program":"Flatten a method's branched, cross-file execution into one editable straight-line program. Edits sync back to real source."
};

// ---- autosuggest combobox ----------------------------------------------------
function symFetch(kindFilter,q,cb){
 fetch("/api/symbols?root="+encodeURIComponent(STATE.sourceRoot)+"&q="+encodeURIComponent(q||""))
  .then(function(r){return r.json()}).then(function(d){cb((d.symbols||[]).filter(kindFilter))}).catch(function(){cb([])})}
function varFetch(file,q,cb){
 fetch("/api/vars?root="+encodeURIComponent(STATE.sourceRoot)+"&file="+encodeURIComponent(file||"")+"&q="+encodeURIComponent(q||""))
  .then(function(r){return r.json()}).then(function(d){cb(d.vars||[])}).catch(function(){cb([])})}
// attach a dropdown to an input. opts.fetch(q,cb) -> items[{label,sub,value,extra}]; pick(item)
function combobox(input,box,fetcher,pick){
 var run=debounce(function(){
  fetcher(input.value,function(items){
   items=items.slice(0,40);
   if(!items.length){box.style.display="none";box.innerHTML="";return}
   box.innerHTML=items.map(function(it,i){return "<div class=acitem data-i='"+i+"'><b>"+esc(it.label)+"</b>"+(it.sub?"<span>"+esc(it.sub)+"</span>":"")+"</div>"}).join("");
   box.style.display="block";
   box.querySelectorAll(".acitem").forEach(function(n){n.onclick=function(e){e.stopPropagation();pick(items[parseInt(n.dataset.i)]);box.style.display="none"}});
  });
 },120);
 input.addEventListener("input",run);input.addEventListener("focus",run);
}
document.addEventListener("click",function(e){if(!e.target.closest(".field"))document.querySelectorAll(".ac").forEach(function(b){b.style.display="none"})});

// ---- param panel -------------------------------------------------------------
function fieldFetcher(t,getFile){
 if(t==="file")return function(q,cb){symFetch(function(s){return s.kind==="file"},q,function(a){cb(a.map(function(s){return{label:s.file,sub:s.kind,value:s.file}}))})};
 if(t==="method")return function(q,cb){symFetch(function(s){return s.kind==="method"||s.kind==="func"},q,function(a){cb(a.map(function(s){return{label:s.name,sub:s.file+":"+s.line,value:s.name,file:s.file}}))})};
 if(t==="type")return function(q,cb){symFetch(function(s){return["class","interface","enum","record","type"].indexOf(s.kind)>=0},q,function(a){cb(a.map(function(s){return{label:s.name,sub:s.kind+" · "+s.file,value:s.name}}))})};
 if(t==="var")return function(q,cb){varFetch(getFile(),q,function(a){cb(a.map(function(v){return{label:v,value:v}}))})};
 return null;
}
function paramVal(k){var i=el("p_"+k);return i?i.value:""}
function getParamFile(){return paramVal("file")}
function renderParams(){
 var a=el("an").value,box=el("params");box.innerHTML="";el("anhint").textContent=HINTS[a]||"";
 if(a==="unrolled-program"){el("unrollctl").style.display="";return}
 el("unrollctl").style.display="none";
 var schema=SCHEMA[a]||[],d=STATE.defaults;
 schema.forEach(function(f){
  var lab=document.createElement("label");lab.textContent=f.k;box.appendChild(lab);
  if(f.t==="select"){
   var s=document.createElement("select");s.id="p_"+f.k;(f.opts||[]).forEach(function(o){var op=document.createElement("option");op.value=op.textContent=o;s.appendChild(op)});box.appendChild(s);
   s.onchange=autoPreviewD;return;
  }
  var wrap=document.createElement("div");wrap.className="field";
  var inp=document.createElement("input");inp.id="p_"+f.k;inp.autocomplete="off";
  // prefill from real-repo defaults
  if(f.k==="file")inp.value=d.entry_file||"";
  else if(f.k==="method")inp.value=d.entry_method||"";
  else if(f.k==="line")inp.value=d.entry_line||"";
  else if(f.k==="var")inp.value=d.example_var||"";
  else if(f.k==="type")inp.value=d.example_type||"";
  else if(f.ex)inp.placeholder=f.ex;
  if(f.ex)inp.placeholder=f.ex;
  wrap.appendChild(inp);
  var fetcher=fieldFetcher(f.t,getParamFile);
  if(fetcher){var ac=document.createElement("div");ac.className="ac";wrap.appendChild(ac);
   combobox(inp,ac,fetcher,function(it){inp.value=it.value;autoPreview()});}
  inp.addEventListener("input",autoPreviewD);
  box.appendChild(wrap);
 });
}
function collectParams(){var a=el("an").value,o={};(SCHEMA[a]||[]).forEach(function(f){var v=paramVal(f.k);if(v!=="")o[f.k]=v});return o}

// ---- preview -----------------------------------------------------------------
function showLensView(){el("lensview").style.display="";el("unrollview").style.display="none"}
function showUnrollView(){el("lensview").style.display="none";el("unrollview").style.display=""}
function autoPreview(){
 tab("result");
 var a=el("an").value;
 if(a==="unrolled-program"){showUnrollView();discover();return}
 showLensView();
 el("out").textContent="running "+a+"…";el("out").className="";el("extra").innerHTML="";
 fetch("/api/preview",{method:"POST",headers:{"Content-Type":"application/json"},
  body:JSON.stringify({analyzer:a,source_root:STATE.sourceRoot,params:collectParams()})})
 .then(function(r){return r.json()}).then(function(d){
  if(d.error){el("out").textContent="error: "+d.error;el("out").className="err";return}
  el("out").className="";
  el("out").textContent=(d.body||"(empty projection)")+"\n— "+d.blocks+" blocks · "+d.facts+" facts · "+d.sync;
  if(d.extra&&d.extra.length){el("extra").innerHTML=d.extra.map(function(e){return "<h2>"+esc(e.path)+"</h2><pre>"+esc(e.body)+"</pre>"}).join("")}
 }).catch(function(e){el("out").textContent=String(e);el("out").className="err"});
}
var autoPreviewD=debounce(autoPreview,350);

// ---- analyzer select ---------------------------------------------------------
function applicable(a){var langs=STATE.applic[a]||[];return langs.indexOf("any")>=0||langs.indexOf(STATE.lang)>=0}
function buildAnalyzerSelect(){
 var s=el("an");s.innerHTML="";
 STATE.analyzers.filter(applicable).forEach(function(a){var o=document.createElement("option");o.value=o.textContent=a;s.appendChild(o)});
 var want=STATE.defaults.analyzer;
 if(want&&Array.from(s.options).some(function(o){return o.value===want}))s.value=want;
}
el("an")&&(el("an").onchange=function(){renderParams();autoPreview()});

// ---- source root + dir picker ------------------------------------------------
function setSourceRoot(root){STATE.sourceRoot=root||".";el("srval").textContent=STATE.sourceRoot}
function reDetect(){
 fetch("/api/detect?root="+encodeURIComponent(STATE.sourceRoot)).then(function(r){return r.json()}).then(function(d){
  STATE.lang=d.language||STATE.lang;STATE.defaults=d.defaults||STATE.defaults;
  el("langtag").textContent=STATE.lang;
  buildAnalyzerSelect();renderParams();prefillEntry();autoPreview();
 });
}
function openPicker(){
 var old=el("picker");if(old){old.remove();return}
 var anchor=el("srchange").getBoundingClientRect();
 var p=document.createElement("div");p.className="picker";p.id="picker";
 p.style.left=anchor.left+"px";p.style.top=(anchor.bottom+6)+"px";
 document.body.appendChild(p);
 var cur=STATE.sourceRoot==="."?"":STATE.sourceRoot;
 function load(path){
  fetch("/api/dirs?path="+encodeURIComponent(path)).then(function(r){return r.json()}).then(function(d){
   var here=d.path||".";
   var h="<div class=crumb><span>"+esc(here||".")+"</span><button class=ghost id=pkuse>Use this</button></div>";
   if(here&&here!==".")h+="<div class=di data-d='"+esc(parentOf(here))+"'>↑ ..</div>";
   (d.dirs||[]).forEach(function(dir){var full=(here&&here!==".")?here+"/"+dir:dir;h+="<div class=di data-d='"+esc(full)+"'>📁 "+esc(dir)+"</div>"});
   p.innerHTML=h;
   p.querySelector("#pkuse").onclick=function(){setSourceRoot(here||".");p.remove();reDetect()};
   p.querySelectorAll(".di").forEach(function(n){n.onclick=function(){load(n.dataset.d)}});
  });
 }
 load(cur);
}
function parentOf(p){var i=p.lastIndexOf("/");return i<0?"":p.slice(0,i)}
el("srchange").onclick=openPicker;

// ---- unrolled-program (Fix) — single entry input, auto-discover --------------
var uFile="",uMethod="";
function setEntryDisplay(){el("uentry").value=(uFile&&uMethod)?(uFile+" › "+uMethod):(uFile||uMethod||"")}
function prefillEntry(){uFile=STATE.defaults.entry_file||"";uMethod=STATE.defaults.entry_method||"";setEntryDisplay()}
combobox(el("uentry"),el("entryac"),
 function(q,cb){
  var term=q.split("›").pop().trim();
  symFetch(function(s){return s.kind==="method"||s.kind==="func"},term,function(a){
   cb(a.map(function(s){return{label:s.name,sub:s.file+":"+s.line,value:s.name,file:s.file}}))})},
 function(it){uFile=it.file;uMethod=it.value;setEntryDisplay();discover()});

var branchState={},inlineSkipState={},originalLines={},dirtyLines={};
function branchString(){var out=[];Object.keys(branchState).sort().forEach(function(k){if(branchState[k])out.push(k+"="+branchState[k])});return out.join(",")}
function inlineSkipString(){return Object.keys(inlineSkipState).filter(function(k){return inlineSkipState[k]}).sort().join(",")}
function inlineDepth(){return parseInt(el("uinline").value||"0",10)}
function updateInlineLabel(){el("uinlinelabel").textContent=String(inlineDepth())}
function ufields(){return {SourceRoot:STATE.sourceRoot,File:uFile,Method:uMethod,Inputs:el("uinputs").value,Branches:branchString(),InlineDepth:String(inlineDepth()),InlineSkips:inlineSkipString()}}
function sideLabel(side){return side==="then"?"true":"false"}
function callDepthLabel(c){return "level "+(c.depth+1)+" · "+(c.origin||c.id).split("/").pop()}
function renderRail(d){
 var choices=d.choices||[],calls=d.calls||[],bar=el("branchbar"),body=el("unrollbody");bar.innerHTML="";
 body.classList.toggle("no-side",!choices.length&&!calls.length);
 if(!choices.length&&!calls.length)return;
 if(calls.length){
  bar.innerHTML+="<span class=title>calls</span>";
  calls.forEach(function(c){
   var t=document.createElement("div");t.className="btab";
   var label=document.createElement("span");label.className="where";label.textContent=c.name||c.id;t.appendChild(label);
   var meta=document.createElement("span");meta.className="meta";meta.textContent=callDepthLabel(c);t.appendChild(meta);
   var sw=document.createElement("span");sw.className="bswitch";
   ["source","inline"].forEach(function(mode){
    var b=document.createElement("button");b.textContent=mode;b.className=((mode==="inline")?c.expanded:!c.expanded)?"on":"";
    b.onclick=function(){
     if(mode==="inline"){delete inlineSkipState[c.id];if(inlineDepth()<=c.depth){el("uinline").value=String(Math.min(10,c.depth+1));updateInlineLabel()}}
     else inlineSkipState[c.id]=true;
     discover();};
    sw.appendChild(b);});
   t.appendChild(sw);bar.appendChild(t);});
 }
 if(choices.length){var ti=document.createElement("span");ti.className="title";ti.textContent="assumptions";bar.appendChild(ti)}
 choices.forEach(function(c,idx){
  if(!branchState[c.id])branchState[c.id]=c.side;
  var t=document.createElement("div");t.className="btab";
  var label=document.createElement("span");label.className="where";label.textContent=c.cond||("branch "+(idx+1));t.appendChild(label);
  var sw=document.createElement("span");sw.className="bswitch";
  (c.sides||[]).forEach(function(side){
   var b=document.createElement("button");b.textContent=sideLabel(side);b.className=branchState[c.id]===side?"on":"";
   b.onclick=function(){branchState[c.id]=side;discover()};sw.appendChild(b);});
  t.appendChild(sw);bar.appendChild(t);});
}
function resetDirty(){dirtyLines={};el("usync").disabled=true;el("usync").textContent="Sync changes"}
function markDirty(row,line,code){
 if(code===originalLines[line])delete dirtyLines[line];else dirtyLines[line]=code;
 row.classList.toggle("dirty",!!dirtyLines[line]);
 var n=Object.keys(dirtyLines).length;el("usync").disabled=n===0;el("usync").textContent=n?"Sync "+n+" change"+(n===1?"":"s"):"Sync changes";
}
function showAssume(e,anchor,guards){
 e.stopPropagation();
 var old=document.getElementById("assume");if(old)old.remove();
 var d=document.createElement("div");d.className="assume";d.id="assume";
 d.innerHTML="<div class=ah>must be true to reach this line</div>"+
  guards.map(function(g){return "<code>"+esc(g)+"</code>"}).join("<span class=amp>AND</span>");
 document.body.appendChild(d);
 var r=anchor.getBoundingClientRect();
 d.style.left=(r.right+8)+"px";d.style.top=(window.scrollY+r.top)+"px";
 setTimeout(function(){document.addEventListener("click",function h(){d.remove();document.removeEventListener("click",h)})},0);
}
var EXIT_RE=/^\s*(return|break|continue|throw)\b/;
var IF_RE=/^\s*(if|else if)\b/;
// Tag early-returns/guards/dead-tail and try/catch structure on the rendered rows.
function tagFlow(items){
 // indentation + trimmed text per row
 items.forEach(function(it){var raw=it.code;it.t=raw.replace(/^\s+/,"");it.indent=raw.length-it.t.length});
 // 1) early return / break / continue / throw, and the conditional guarding them
 items.forEach(function(it,i){
  if(EXIT_RE.test(it.code)){it.row.classList.add("exit");
   // a preceding if on its own line whose body is this exit = a guard
   var p=items[i-1];if(p&&IF_RE.test(p.code))p.row.classList.add("guard");}
  if(IF_RE.test(it.code)&&EXIT_RE.test(it.code))it.row.classList.add("guard"); // inline: if(x) return;
 });
 // 2) try / catch / finally — headers + brace-only lines = struct; catch bodies fold
 items.forEach(function(it){
  if(/^try\b/.test(it.t)||/^\}?\s*finally\b/.test(it.t)){it.row.classList.add("struct")}
  if(/^\}?\s*catch\b/.test(it.t)){it.row.classList.add("struct");it.row.classList.add("catchhdr")}
  if(/^[{}]+;?$/.test(it.t)){it.row.classList.add("struct")}
 });
 // catch body lines (indented deeper than the catch header) — by indentation
 items.forEach(function(it,i){
  if(!it.row.classList.contains("catchhdr"))return;
  var bodyRows=[];
  for(var j=i+1;j<items.length;j++){if(items[j].indent<=it.indent)break;items[j].row.classList.add("catchbody");bodyRows.push(items[j].row)}
  it.row.querySelector(".code").onclick=function(){bodyRows.forEach(function(r){r.classList.toggle("show")})};
 });
}
function renderProg(d){
 renderRail(d);resetDirty();originalLines={};
 var prog=el("uprog");prog.innerHTML="";var items=[];
 (d.lines||[]).forEach(function(l){
  originalLines[l.n]=l.code;
  var row=document.createElement("div");row.className="pl";row.dataset.line=l.n;
  var org=document.createElement("div");org.className="org";org.textContent=l.origin||"";
  var guards=l.guards||[];
  if(guards.length){row.classList.add("hasg");org.title="assumptions to reach this line — click";
   org.onclick=function(e){showAssume(e,org,guards)};}
  else{org.title=l.origin||"";if(l.origin)org.onclick=function(){var f=l.origin.split(":")[0];uFile=f;setEntryDisplay()}}
  var code=document.createElement("div");code.className="code";code.contentEditable="true";code.spellcheck=false;code.textContent=l.code;
  code.oninput=function(){markDirty(row,l.n,code.textContent)};
  code.onkeydown=function(e){if(e.key==="Enter"){e.preventDefault();code.blur()}if(e.key==="Tab"){e.preventDefault();document.execCommand("insertText",false,"    ")}};
  row.appendChild(org);row.appendChild(code);prog.appendChild(row);
  items.push({row:row,code:l.code});
 });
 tagFlow(items);
 prog.classList.toggle("fold",foldHandlers);
 var b=el("ubanner");
 if(d.unresolved){b.style.display="";b.className="banner";
  b.innerHTML=d.inputs?"⚠ Some branches depend on <b>runtime</b> values — both paths shown. Flip assumptions on the right to read one.":"① Unresolved branches. Type <b>inputs</b> on the left to collapse to the path that runs, or flip assumptions on the right.";}
 else if((d.lines||[]).length){b.style.display="";b.className="banner ok";
  b.innerHTML="✓ Editable path"+(d.inputs?" for <code>"+esc(d.inputs)+"</code>":"")+". Edit code directly, then Sync. Assumptions stay on the right.";}
 else b.style.display="none";
}
function discover(){
 if(!uFile||!uMethod){el("ustatus").textContent="pick an entry file › method above";el("uprog").innerHTML="";return}
 showUnrollView();el("ustatus").textContent="running…";
 fetch("/api/unroll",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(ufields())})
  .then(function(r){return r.json()}).then(function(d){
   if(d.error){el("ustatus").textContent="error: "+d.error;return}
   renderProg(d);el("ustatus").textContent="";});
}
var discoverD=debounce(discover,400);
var foldHandlers=false;
el("foldtc").onclick=function(){foldHandlers=!foldHandlers;el("uprog").classList.toggle("fold",foldHandlers);el("foldtc").textContent=foldHandlers?"Show try/catch":"Hide try/catch"};
el("uinputs").addEventListener("input",discoverD);
el("uinputs").addEventListener("keydown",function(e){if(e.key==="Enter")discover()});
el("uentry").addEventListener("input",function(){var v=el("uentry").value;if(v.indexOf("›")>=0){var p=v.split("›");uFile=p[0].trim();uMethod=p[1].trim()}});
el("uinline").addEventListener("input",updateInlineLabel);
el("uinline").addEventListener("change",discoverD);
function saveEdits(edits){
 if(!edits.length)return;
 el("ustatus").textContent="syncing…";var body=ufields();body.Edits=edits;
 fetch("/api/unroll/edit",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)})
  .then(function(r){return r.json()}).then(function(d){
   if(d.error){el("ustatus").textContent="error: "+d.error;return}
   renderProg(d);el("uprog").querySelectorAll(".pl").forEach(function(r){r.classList.add("flash")});
   el("ustatus").innerHTML="✓ synced ("+d.synced+")";flash("synced to source");});
}
el("usync").onclick=function(){
 var edits=Object.keys(dirtyLines).map(function(k){return {Line:parseInt(k),NewCode:dirtyLines[k]}}).sort(function(a,b){return a.Line-b.Line});
 saveEdits(edits);
};
